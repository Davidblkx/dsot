
[workspace]
members = ["src/music_brainz"]
resolver = "2"

[workspace.package]
edition = "2024"
authors = ["David Pires<dev@davidpires.pt>"]
license = "MIT"
repository = "https://github.com/Davidblkx/dsot"

[workspace.dependencies]
chrono = { version = "0.4" }
env_logger = { version = "0.11" }
log = { version = "0.4" }
paste = { version = "1.0.15" }
reqwest = { version = "0.13", features = ["blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1.0" }
thiserror = { version = "2" }
tokio = { version = "1.52", features = ["full"] }
url = { version = "2.5" }
urlencoding = { version = "2.1" }
